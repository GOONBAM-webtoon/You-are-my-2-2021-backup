<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>너는 나의 2% 백업 아카이브</title>
    <style>
        body { font-family: 'Malgun Gothic', sans-serif; text-align: center; background-color: #f4f4f4; padding: 20px; }
        .container { max-width: 650px; margin: 0 auto; background: white; padding: 30px; border-radius: 15px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); overflow: hidden; }
        
        /* 메인 포스터 스타일 */
        .main-poster { width: 100%; height: auto; border-radius: 10px; margin-bottom: 25px; display: block; }
        
        h1 { color: #222; margin-bottom: 10px; font-size: 28px; font-weight: 900; }
        .sub-text { color: #555; line-height: 1.6; margin-bottom: 30px; font-size: 14.5px; word-break: keep-all; }
        .highlight { color: #d32f2f; font-weight: bold; } /* 강조 문구 색상 */

        .episode-list { list-style: none; padding: 0; margin: 0; }
        .episode-item { margin-bottom: 12px; border-bottom: 1px solid #f0f0f0; padding-bottom: 12px; }
        .episode-item:last-child { border-bottom: none; }
        
        .episode-link { display: flex; align-items: center; text-decoration: none; color: #333; padding: 10px; border-radius: 10px; transition: background-color 0.2s; }
        .episode-link:hover { background-color: #f0fdf4; }
        
        .ep-thumb { width: 85px; height: 55px; object-fit: cover; border-radius: 6px; margin-right: 18px; border: 1px solid #eee; background-color: #fafafa; }
        
        .ep-text-group { display: flex; flex-direction: column; text-align: left; }
        .ep-number { font-size: 13px; color: #00d564; font-weight: bold; margin-bottom: 4px; }
        .ep-title { font-size: 16px; font-weight: 600; }
    </style>
</head>
<body>
    <div class="container">
        <img src="poster.jpg" alt="너는 나의 2% 메인 포스터" class="main-poster">

        <h1>너는 나의 2%</h1>
        
        <div class="sub-text">
            <p>2021~2022 연재분 원본 및 전체 댓글 백업 아카이브입니다.</p>
            <p>네이버 웹툰의 경우 회차를 비공개 처리하면 추후에 다시 온전한 복구가 어려워지기에, <br>
            소중한 기록들을 지키고자 이렇게 직접 백업 페이지를 제작하여 복구해 보았습니다.</p>
            <p>그동안 함께해 주시고 응원해 주신 모든 독자분께 진심으로 감사드립니다!</p>
        </div>
        
        <ul class="episode-list">
            </ul>
    </div>
</body>
</html>
